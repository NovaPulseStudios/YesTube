<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube iframe API Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #ff0000;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background-color: #cc0000;
        }
        #status {
            margin-top: 10px;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>YouTube Player API Test</h2>
    
    <div id="player"></div>

    <div class="controls">
        <button onclick="playVideo()">Play</button>
        <button onclick="pauseVideo()">Pause</button>
    </div>
    <div id="status">Player Status: Loading...</div>
</div>

<script>
    // 1. Load the IFrame Player API code asynchronously.
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // 2. Create an <iframe> (and YouTube player) after the API code downloads.
    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '360',
            width: '640',
            videoId: 'GWkOJWRQiB0', // Replace with your YouTube Video ID
            playerVars: {
                'playsinline': 1,
                'origin': window.location.origin // Crucial for GitHub Pages HTTPS security
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    // 3. The API will call this function when the video player is ready.
    function onPlayerReady(event) {
        document.getElementById('status').innerText = "Player Status: Ready to play";
    }

    // 4. The API calls this function when the player's state changes.
    function onPlayerStateChange(event) {
        var statusText = "Status: ";
        switch(event.data) {
            case YT.PlayerState.UNSTARTED: statusText += "Unstarted"; break;
            case YT.PlayerState.ENDED:     statusText += "Ended"; break;
            case YT.PlayerState.PLAYING:   statusText += "Playing"; break;
            case YT.PlayerState.PAUSED:    statusText += "Paused"; break;
            case YT.PlayerState.BUFFERING: statusText += "Buffering"; break;
            case YT.PlayerState.CUED:      statusText += "Cued"; break;
        }
        document.getElementById('status').innerText = statusText;
    }

    // 5. Control functions hooked up to HTML buttons
    function playVideo() {
        if (player && player.playVideo) {
            player.playVideo();
        }
    }

    function pauseVideo() {
        if (player && player.pauseVideo) {
            player.pauseVideo();
        }
    }
</script>

</body>
</html>
