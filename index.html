<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YesTube Prototype</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; border-radius: 4px; border: none; }
        button { background: #00bfff; color: white; cursor: pointer; font-weight: bold; }
        .video-container { margin-top: 20px; }
        video { width: 100%; max-width: 720px; border: 2px solid #00bfff; border-radius: 8px; }
        #status { color: #888; margin: 10px; }
    </style>
</head>
<body>

    <h1>📺 YesTube</h1>
    <p>Bypassing standard iframe blocks via direct stream extraction</p>

    <input type="text" id="videoUrl" placeholder="Paste YouTube Video URL or ID" style="width: 300px;">
    <button onclick="loadBypassVideo()">Load Video</button>

    <div id="status">Ready. Input a video to stream locally.</div>

    <div class="video-container">
        <video id="localPlayer" controls autoplay></video>
    </div>

<script>
    async function loadBypassVideo() {
        const input = document.getElementById('videoUrl').value;
        const status = document.getElementById('status');
        const player = document.getElementById('localPlayer');
        
        // Extract video ID from input
        let videoId = input;
        if (input.includes('v=')) {
            videoId = input.split('v=')[1].split('&')[0];
        } else if (input.includes('youtu.be/')) {
            videoId = input.split('youtu.be/')[1].split('?')[0];
        }

        if (!videoId) {
            status.innerText = "Error: Invalid Video URL or ID";
            return;
        }

        status.innerText = "Extracting clean video stream...";

        try {
            // Using a public Invidious API instance to fetch the raw video stream
            // Note: Public instances can sometimes be slow or rate-limited
            const response = await fetch(`https://invidious.nerdvpn.de/api/v1/videos/${videoId}`);
            const data = await response.json();

            // Grab the highest quality direct MP4 stream available
            const formatStreams = data.formatStreams;
            if (formatStreams && formatStreams.length > 0) {
                // Set the player source straight to the raw video URL file link
                player.src = formatStreams[0].url; 
                status.innerText = `Playing: ${data.title}`;
            } else {
                status.innerText = "Could not extract direct stream for this video.";
            }
        } catch (error) {
            console.error(error);
            status.innerText = "Error connecting to the extraction server. Try another video.";
        }
    }
</script>

</body>
</html>
