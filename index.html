<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YesTube - Video Bypass Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            color: #00bfff;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        input[type="text"] {
            width: 70%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            font-size: 16px;
        }

        input[type="text"]:focus {
            outline: 2px solid #00bfff;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            background-color: #00bfff;
            color: black;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0099cc;
        }

        #status {
            margin: 15px 0;
            font-size: 14px;
            color: #ffcc00;
            font-style: italic;
            min-height: 20px;
        }

        .player-section {
            margin-top: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none; /* Hidden until a video loads */
        }

        video {
            width: 100%;
            border-radius: 6px;
            border: 1px solid #444;
            background: #000;
        }

        .download-container {
            margin-top: 15px;
        }

        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
        }

        .download-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📺 YesTube</h1>
    <div class="subtitle">Bypass restrictions by streaming direct local video files</div>

    <div class="search-box">
        <input type="text" id="videoUrl" placeholder="Paste YouTube Video URL or ID here...">
        <button onclick="loadBypassVideo()">Load Video</button>
    </div>

    <div id="status">Ready. Paste a link to break past the block.</div>

    <div class="player-section" id="playerSection">
        <video id="localPlayer" controls autoplay playsinline></video>
        <div class="download-container">
            <a id="downloadBtn" class="download-btn" href="#" target="_blank" download>📥 Download File Directly</a>
        </div>
    </div>
</div>

<script>
    // Rotator list of backend API servers running Invidious code
    const invidiousInstances = [
        "https://inv.thepixora.com",
        "https://invidious.f5.si",
        "https://invidious.nerdvpn.de",
        "https://inv.nadeko.net"
    ];

    async function loadBypassVideo() {
        const input = document.getElementById('videoUrl').value.trim();
        const status = document.getElementById('status');
        const player = document.getElementById('localPlayer');
        const playerSection = document.getElementById('playerSection');
        const downloadBtn = document.getElementById('downloadBtn');
        
        // Auto-extract video ID from full YouTube browser links
        let videoId = input;
        if (input.includes('v=')) {
            videoId = input.split('v=')[1].split('&')[0];
        } else if (input.includes('youtu.be/')) {
            videoId = input.split('youtu.be/')[1].split('?')[0];
        }

        if (!videoId) {
            status.style.color = "#ff4444";
            status.innerText = "Error: Please enter a valid YouTube URL or Video ID.";
            return;
        }

        // Hide old layout setup if user tries running a second link
        playerSection.style.display = "none";
        player.src = "";

        // Loop through proxy servers to find an unblocked path
        for (let i = 0; i < invidiousInstances.length; i++) {
            const currentDomain = invidiousInstances[i];
            status.style.color = "#ffcc00";
            status.innerText = `Bypassing filter... Trying server ${i + 1}/${invidiousInstances.length}...`;

            try {
                // Fetch direct asset details from proxy API configuration
                const response = await fetch(`${currentDomain}/api/v1/videos/${videoId}`);
                
                if (!response.ok) throw new Error("Instance rejected request");

                const data = await response.json();
                const formatStreams = data.formatStreams;

                if (formatStreams && formatStreams.length > 0) {
                    // Pull highest priority raw mp4 file address out of array
                    const rawStreamUrl = formatStreams[0].url; 
                    
                    // Attach link endpoints directly to pure HTML targets
                    player.src = rawStreamUrl; 
                    downloadBtn.href = rawStreamUrl;
                    
                    // Force reveal the local frame block setup
                    playerSection.style.display = "block";
                    status.style.color = "#00ffcc";
                    status.innerText = `Success! Playing: "${data.title}"`;
                    return; 
                }
            } catch (error) {
                console.warn(`Server ${currentDomain} was blocked or unresponsive.`);
            }
        }

        // Catch-all state trigger if loop terminates dry
        status.style.color = "#ff4444";
        status.innerText = "Bypass Failed: Jamf is blocking all active API nodes, or servers are rate-limited. Try another link later.";
    }
</script>

</body>
</html>
