<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YesTube Prototype</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            text-align: center; 
            padding: 20px; 
        }
        input, button { 
            padding: 10px; 
            font-size: 16px; 
            margin: 5px; 
            border-radius: 4px; 
            border: none; 
        }
        input {
            background: #222;
            color: #fff;
            border: 1px solid #333;
        }
        input:focus {
            outline: 1px solid #00bfff;
        }
        button { 
            background: #00bfff; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover {
            background: #009acd;
        }
        .video-container { 
            margin-top: 20px; 
        }
        video { 
            width: 100%; 
            max-width: 720px; 
            border: 2px solid #00bfff; 
            border-radius: 8px; 
            background: #000;
        }
        #status { 
            color: #888; 
            margin: 10px; 
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>📺 YesTube</h1>
    <p>Bypassing standard iframe blocks via direct stream extraction</p>

    <input type="text" id="videoUrl" placeholder="Paste YouTube Video URL or ID" style="width: 300px;">
    <button onclick="loadBypassVideo()">Load Video</button>

    <div id="status">Ready. Input a video to stream locally.</div>

    <div class="video-container">
        <video id="localPlayer" controls autoplay></video>
    </div>

<script>
    // A list of active public Invidious API domains to rotate through if one fails
    const invidiousInstances = [
        "https://inv.thepixora.com",
        "https://invidious.f5.si",
        "https://invidious.nerdvpn.de",
        "https://inv.nadeko.net",
        "https://invidious.no-logs.com"
    ];

    async function loadBypassVideo() {
        const input = document.getElementById('videoUrl').value.trim();
        const status = document.getElementById('status');
        const player = document.getElementById('localPlayer');
        
        // Extract video ID from input
        let videoId = input;
        if (input.includes('v=')) {
            videoId = input.split('v=')[1].split('&')[0];
        } else if (input.includes('youtu.be/')) {
            videoId = input.split('youtu.be/')[1].split('?')[0];
        } else if (input.includes('embed/')) {
            videoId = input.split('embed/')[1].split('?')[0];
        }

        if (!videoId || videoId.length < 5) {
            status.style.color = "#ff4444";
            status.innerText = "Error: Invalid YouTube Video URL or ID";
            return;
        }

        status.style.color = "#888";
        
        // Loop through instances until one successfully answers
        for (let i = 0; i < invidiousInstances.length; i++) {
            const currentDomain = invidiousInstances[i];
            status.innerText = `Attempting connection via server ${i + 1}/${invidiousInstances.length}...`;

            try {
                // Fetch video details and raw media stream links asynchronously
                const response = await fetch(`${currentDomain}/api/v1/videos/${videoId}`);
                
                if (!response.ok) throw new Error("Server response was not OK");

                const data = await response.json();
                const formatStreams = data.formatStreams;

                if (formatStreams && formatStreams.length > 0) {
                    // Success! Pass the raw stream URL straight into the HTML5 player source
                    player.src = formatStreams[0].url; 
                    status.style.color = "#00bfff";
                    status.innerText = `Playing: "${data.title}" (via ${currentDomain.replace('https://','')})`;
                    return; // Break out of the function entirely on success
                }
            } catch (error) {
                console.warn(`Server ${currentDomain} failed or was blocked. Trying next configuration...`);
            }
        }

        // If the loop completely runs out without hitting 'return'
        status.style.color = "#ff4444";
        status.innerText = "All extraction servers failed. They may be rate-limited by YouTube or restricted by Jamf Network rules.";
    }
</script>

</body>
</html>
